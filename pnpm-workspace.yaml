    eslint: ^10.2.1
    husky: ^9.1.7
    nano-staged: ^1.0.2
    nuxt: ^4.4.2
    nuxt-auth-utils: ^0.5.29
    tailwindcss: ^4.2.4
    tailwindcss-motion: ^1.1.1
    typescript: ^6.0.3
    vue-tsc: ^3.2.7
  integrations:
    '@nuxt/ui': ^4.7.0
    '@paralleldrive/cuid2': ^3.3.0
    '@vueuse/components': ^14.2.1
