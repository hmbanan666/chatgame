    eslint: ^10.2.0
    husky: ^9.1.7
    nano-staged: ^0.9.0
    nuxt: ^4.4.2
    nuxt-auth-utils: ^0.5.29
    tailwindcss: ^4.2.2
    tailwindcss-motion: ^1.1.1
    typescript: ^5.9.3
    vue-tsc: ^3.2.6
  integrations:
    '@nuxt/ui': ^4.6.1
    '@paralleldrive/cuid2': 3.3.0
    '@vueuse/components': ^14.2.1
    '@vueuse/core': ^14.2.1
    '@vueuse/nuxt': ^14.2.1
    drizzle-cuid2: ^2.2.0
